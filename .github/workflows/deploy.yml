name: Deploy to GitHub Pages

# Publishes index.html to Pages on every push to main (and on demand). Required because the
# Pages source is "GitHub Actions": branch pushes no longer auto-publish on their own.
# (The bake workflow deploys in-run instead, because its bot-token commit would not trigger
# this workflow.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (single file)
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f .nojekyll ] && cp .nojekyll _site/ || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
